<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashore</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #1f2937;
      background:
        radial-gradient(circle at top left, rgba(255, 228, 214, 0.9), transparent 34%),
        linear-gradient(135deg, #f7f1eb 0%, #eef3f8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .shell {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px);
    }
    .hero {
      padding: 42px 38px;
      background:
        linear-gradient(180deg, rgba(190, 30, 45, 0.06), rgba(190, 30, 45, 0)),
        linear-gradient(135deg, #fcfaf8 0%, #f6ebe3 100%);
      border-right: 1px solid rgba(190, 30, 45, 0.08);
    }
    .hero h1 {
      margin: 0 0 14px;
      font-size: 34px;
      line-height: 1.15;
      color: #7a1d16;
    }
    .runtime-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      margin-bottom: 16px;
      border-radius: 999px;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      border: 1px solid #dbe4ee;
      background: #f8fafc;
      color: #475569;
      letter-spacing: .02em;
    }
    .runtime-badge[data-mode="docker"] {
      background: #ecfdf5;
      border-color: #bbf7d0;
      color: #166534;
    }
    .runtime-badge[data-mode="local"] {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
    }
    .runtime-badge[data-mode="unknown"] {
      background: #fff7ed;
      border-color: #fed7aa;
      color: #c2410c;
    }
    .hero p {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.8;
      color: #5b6472;
    }
    .points {
      display: grid;
      gap: 10px;
      margin-top: 28px;
    }
    .point {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(190, 30, 45, 0.08);
      font-size: 13px;
      line-height: 1.7;
      color: #4b5563;
    }
    .form-wrap {
      padding: 42px 34px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }
    .card-title {
      margin: 0;
      font-size: 24px;
      color: #111827;
    }
    .sub {
      margin: 4px 0 0;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.7;
    }
    .form-group {
      display: grid;
      gap: 8px;
    }
    .form-group label {
      font-size: 13px;
      color: #374151;
      font-weight: 600;
    }
    .form-group input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      background: #fff;
      padding: 13px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    .form-group input:focus {
      border-color: #be1e2d;
      box-shadow: 0 0 0 4px rgba(190, 30, 45, 0.08);
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .16s ease, opacity .16s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(135deg, #be1e2d 0%, #8f171f 100%);
      color: #fff;
    }
    .hint {
      min-height: 20px;
      font-size: 12px;
      color: #b91c1c;
    }
    .ok {
      color: #047857;
    }
    @media (max-width: 820px) {
      .shell { grid-template-columns: 1fr; }
      .hero { border-right: none; border-bottom: 1px solid rgba(190, 30, 45, 0.08); }
    }
    @media (max-width: 560px) {
      body { padding: 14px; }
      .hero, .form-wrap { padding: 26px 20px; }
      .hero h1 { font-size: 28px; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div id="runtimeBadge" class="runtime-badge" data-mode="unknown">Runtime: loading</div>
      <h1>Ashore</h1>
      <p>登录后即可继续访问你的个人学习空间、同步内容与历史记录。</p>
      <div class="points">
        <div class="point">账号数据按用户隔离保存，避免不同设备或不同用户的内容混在一起。</div>
        <div class="point">同一账号可在不同入口继续访问个人内容，并保持云端同步能力。</div>
        <div class="point">当前入口仅支持登录，当前入口仅支持登录，不开放自助注册。首次启动若没有账号，系统会自动创建默认管理员。</div>
      </div>
    </section>

    <section class="form-wrap">
      <div>
        <h2 class="card-title">登录</h2>
        <p class="sub">请使用管理员发放的用户名和密码登录。</p>
      </div>

      <div class="form-group">
        <label for="username">用户名</label>
        <input id="username" type="text" placeholder="至少 2 个字符">
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input id="password" type="password" placeholder="至少 6 个字符">
      </div>

      <div id="hint" class="hint"></div>

      <div class="actions">
        <button class="btn btn-primary" id="loginBtn" type="button">登录</button>
      </div>
    </section>
  </div>

  <script>
    const hintEl = document.getElementById('hint');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const runtimeBadge = document.getElementById('runtimeBadge');

    async function refreshRuntimeBadge() {
      if (!runtimeBadge) return;
      try {
        const res = await fetch('/api/runtime-info', { credentials: 'same-origin', cache: 'no-store' });
        if (!res.ok) throw new Error('runtime-info failed');
        const data = await res.json();
        const mode = String(data.mode || 'unknown');
        const label = String(data.label || 'Unknown runtime');
        const origin = String(data.origin || '');
        runtimeBadge.dataset.mode = mode;
        runtimeBadge.textContent = label;
        runtimeBadge.title = origin ? `${label}\n${origin}` : label;
      } catch (_) {
        runtimeBadge.dataset.mode = 'unknown';
        runtimeBadge.textContent = 'Runtime: unknown';
        runtimeBadge.title = 'Failed to load runtime info';
      }
    }

    async function checkSession() {
      try {
        const res = await fetch('/api/me', { credentials: 'include' });
        const data = await res.json();
        if (data && data.authenticated) {
          window.location.replace('/');
        }
      } catch (_) {}
    }

    function setHint(message, ok) {
      hintEl.textContent = message || '';
      hintEl.className = ok ? 'hint ok' : 'hint';
    }

    async function submitAuth() {
      const username = (usernameEl.value || '').trim();
      const password = passwordEl.value || '';
      if (username.length < 2 || password.length < 6) {
        setHint('用户名至少 2 位，密码至少 6 位。');
        return;
      }

      loginBtn.disabled = true;
      setHint('正在登录...', true);

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.detail || data.error || '请求失败');
        }
        setHint('登录成功，正在进入...', true);
        window.location.replace('/');
      } catch (error) {
        setHint(error.message || '请求失败');
      } finally {
        loginBtn.disabled = false;
      }
    }

    loginBtn.addEventListener('click', () => submitAuth());
    passwordEl.addEventListener('keydown', event => {
      if (event.key === 'Enter') submitAuth();
    });

    refreshRuntimeBadge();
    checkSession();
  </script>
</body>
</html>
