<div class="v53-mobile-topbar">
  <div class="v53-mobile-topbar-left">
    <button aria-label="打开目录" class="v53-icon-btn" data-onclick="toggleMobileSidebar()" id="mobileTopbarMenuBtn" type="button">☰</button>
    <div class="v53-mobile-title">
      <div class="v53-mobile-title-main" id="mobileHeaderTitle">学习笔记</div>
      <div class="v53-mobile-title-sub">Ashore 5.3</div>
    </div>
  </div>
  <div class="v53-mobile-topbar-right">
    <button aria-label="快速录题" class="v53-icon-btn" id="mobileHeaderAdd" type="button">＋</button>
    <button aria-label="保存到云端" class="v53-icon-btn" id="mobileHeaderSave" type="button">☁</button>
  </div>
</div>
﻿<div class="sidebar">
<div class="sidebar-logo">
<div>Ashore</div>
<div class="runtime-badge" data-mode="unknown" id="runtimeBadge">Runtime: loading</div>
</div>
<div class="sidebar-tools">
<div class="sidebar-tools-row">
<button class="btn btn-primary" data-onclick="openQuickAddModal()">+ 添加</button>
<div class="more-menu" id="moreMenu">
<button class="btn btn-secondary" data-onclick="toggleMoreMenu(event)">更多</button>
<div class="more-menu-panel" id="moreMenuPanel">
<button class="btn btn-secondary" data-onclick="closeMoreMenu();openQuickImportModal()">导入错题</button>
<button class="btn btn-secondary" data-onclick="closeMoreMenu();openExportModal()">导出</button>
<button class="btn btn-secondary" data-onclick="closeMoreMenu();openClaudeHelper()">发给CC</button>
<button class="btn btn-secondary" data-onclick="closeMoreMenu();openRichNoteEditorFromMore()">Markdown备注（专业）</button>
<button class="btn btn-secondary" data-onclick="closeMoreMenu();openDashboard()">学习统计</button>
<button class="btn btn-secondary" data-onclick="closeMoreMenu();printList()">打印</button>
<details class="more-menu-advanced">
<summary>高级数据</summary>
<div class="more-menu-advanced-body">
<button class="btn btn-secondary" data-onclick="closeMoreMenu();clearCurrentModuleErrors()">清空当前模块</button>
<button class="btn btn-secondary" data-onclick="closeMoreMenu();clearAllErrorsData()">清空全部错题</button>
<button class="btn btn-secondary" data-onclick="closeMoreMenu();resetAllStudyData()">重置全部学习数据</button>
</div>
</details>
</div>
</div>
</div>
<div class="cloud-controls sidebar-cloud-controls">
<div class="cloud-meta">
<div class="cloud-status-line">
<span id="cloudUserBadge" style="font-size:12px;color:#666">Cloud: offline</span>
<span class="cloud-status-badge" id="cloudSyncBadge">idle</span>
<button class="cloud-details-toggle" data-onclick="toggleCloudDetails()" id="cloudDetailsToggle" type="button">详情</button>
</div>
<div class="cloud-status-hint" id="cloudSyncHint">Local cache is per origin.</div>
<div class="cloud-origin-list" id="cloudOriginStatus"></div>
</div>
<div class="sidebar-tools-row sidebar-cloud-actions">
<button class="btn btn-secondary" data-onclick="loadCloudBackup()">Cloud Load</button>
<button class="btn btn-secondary" data-onclick="saveCloudBackup()">Cloud Save</button>
<button class="btn btn-secondary" data-onclick="logoutCloud()" id="cloudLogoutBtn">Logout</button>
</div>
</div>
</div>
<div class="quiz-block">
<button class="quiz-btn" data-onclick="startQuiz()" id="quizBtn">
<span>今日训练</span>
<span class="badge" id="quizBadge">0</span>
</button>
<button class="quiz-btn" data-onclick="startFullPractice()" id="fullPracticeBtn" style="margin-top:6px;background:linear-gradient(135deg,#3498db,#2471a3)">
<span>全量练习</span>
<span class="badge" id="fullPracticeBadge">0</span>
</button>
<div class="today-progress">
<div class="prog-label"><span>今日进度</span><span id="progText">0/0</span></div>
<div class="prog-bar-bg"><div class="prog-bar-fill" id="progFill" style="width:0%"></div></div>
</div>
</div>
<div class="sidebar-tree-toolbar">
<div class="sidebar-tree-toolbar-row">
<div class="sidebar-tree-search">
<span class="search-icon">搜索</span>
<input data-oninput="onKnowledgeTreeSearchInput()" id="knowledgeTreeSearchInput" placeholder="搜索知识树节点..." type="text"/>
<button aria-label="清空知识树搜索" class="search-clear" data-onclick="clearKnowledgeTreeSearch()" id="knowledgeTreeSearchClear" type="button">×</button>
</div>
<button class="btn btn-secondary" data-onclick="toggleKnowledgeTreeFocusMode()" id="knowledgeTreeFocusBtn" type="button">专注树</button>
</div>
<div class="sidebar-tree-search-meta" id="knowledgeTreeSearchMeta"></div>
</div>
<div class="nav-scroll" id="navScroll"></div>
</div>
<button aria-label="打开目录" class="mobile-sidebar-toggle" data-onclick="toggleMobileSidebar()" id="mobileSidebarToggle" type="button">☰</button>
<div class="mobile-sidebar-mask" data-onclick="closeMobileSidebar()" id="mobileSidebarMask"></div>
<div class="main-area">
<div class="toast-stack" id="toastStack"></div>

<div class="app-view app-view-home active" id="homeView">
<div class="home-shell">
<div class="home-shell-header">
<div>
<div class="home-shell-kicker">学习首页</div>
<h2>先决定今天做什么，再进入工作台执行</h2>
<div class="home-shell-sub">首页负责调度任务、弱点和必看笔记；进入工作台后再录题、看错题和写笔记。</div>
</div>
<div class="home-shell-actions">
<button class="btn btn-primary" data-onclick="openWorkspaceView('errors')">进入错题工作台</button>
<button class="btn btn-secondary" data-onclick="openWorkspaceQuickAdd()">继续录题</button>
</div>
</div>
<div id="homeDashboardContent"></div>
</div>
</div>

<div class="app-view app-view-workspace" id="workspaceView">
<div class="tab-content" id="tabContentErrors">
<div class="errors-area">
<div class="errors-header">
<h2>错题列表</h2>
<div class="errors-header-actions">
<div class="search-box">
<span class="search-icon">搜索</span>
<input data-oninput="onSearch();updateSearchClear()" data-onkeydown="if(event.key==='Enter')onSearch()" id="searchInput" placeholder="搜索题目、解析..." type="text"/>
<button class="search-clear" data-onclick="clearSearchInput()" id="searchClear">×</button>
</div>
<button class="btn btn-secondary" data-onclick="toggleBatchMode()" id="batchToggleBtn" type="button">批量操作</button>
</div>
</div>
<div class="date-filter-bar">
录入日期：
<input data-onchange="applyDateFilter()" id="dateFrom" type="date"/>
<span style="color:#ccc">至</span>
<input data-onchange="applyDateFilter()" id="dateTo" type="date"/>
<button class="btn btn-sm btn-secondary" data-onclick="clearDateFilter()">清除日期</button>
<button class="btn btn-sm btn-secondary" data-onclick="clearFilter()">重置筛选</button>
</div>
<div class="content-header" style="padding:10px 16px;border-bottom:1px solid #f0f0f0;border-top:1px solid #f0f0f0">
<div class="breadcrumb" id="breadcrumb">全部题目</div>
<div style="display:flex;align-items:center;gap:10px">
<div class="stats-bar" id="statsBar"></div>
<button class="btn btn-sm btn-secondary" data-onclick="openGlobalSearchModal()" title="Ctrl+K">全局搜索</button>
</div>
</div>
<div class="batch-bar hidden" id="batchBar">
<span id="batchCount">已选 0 题</span>
<button class="btn btn-sm btn-secondary" data-onclick="openBatchKnowledgeMove()" type="button">批量改挂载</button>
<button class="btn btn-sm btn-secondary" data-onclick="executeBatch('delete')" type="button">批量删除</button>
<button class="btn btn-sm btn-secondary" data-onclick="toggleBatchMode()" type="button">完成</button>
</div>
<div class="errors-list" id="errorList"></div>
</div>
</div>

<div class="tab-content active" id="tabContentNotes">
<div class="notes-area">
<div class="notes-header">
<h2>学习笔记</h2>
<div style="display:flex;gap:8px">
<button class="btn btn-secondary" data-onclick="openGlobalSearchModal()">全局搜索</button>
<button class="btn btn-secondary" data-onclick="deleteSelectedKnowledgeNode()">删除知识点</button>
<button class="btn btn-secondary" data-onclick="clearNotes()">清空</button>
</div>
</div>
<div class="notes-content" id="notesContent"></div>
</div>
</div>
</div>
</div>

  <button class="v53-quick-btn active" id="mobileQuickNotes" type="button">
    <strong>笔记</strong>
    <span>知识区</span>
  </button>
  <button class="v53-quick-btn" id="mobileQuickErrors" type="button">
    <strong>错题</strong>
    <span>列表区</span>
  </button>

    <strong>录题</strong>
    <span>新建</span>
  </button>
  <button class="v53-quick-btn" id="mobileQuickReview" type="button">
    <strong>复习</strong>
    <span class="v53-badge" id="mobileReviewBadge">0</span>
  </button>
</div>
