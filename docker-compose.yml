services:
  app:
    build:
      context: .
    container_name: xingce_v3_app
    ports:
      - "8000:8000"
      - "8080:8000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M2.5}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://127.0.0.1:8000,http://localhost:8000}
      OCR_BACKEND: ${OCR_BACKEND:-tesseract}
      OCR_TESSERACT_FALLBACK: ${OCR_TESSERACT_FALLBACK:-true}
      UMI_OCR_URL: ${UMI_OCR_URL:-http://umi-ocr:1224/api/ocr}
    volumes:
      - ./data:/app/data
      - ./runtime:/app/runtime
    restart: unless-stopped

  umi-ocr:
    image: xtulnx/ocr-umi:latest
    container_name: xingce_v3_umi_ocr
    environment:
      HEADLESS: "true"
    ports:
      - "1224:1224"
    restart: unless-stopped
    profiles:
      - ocr-wechat

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: xingce_v3_tunnel
    depends_on:
      - app
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    volumes:
      - ./runtime:/runtime
    restart: unless-stopped
    profiles:
      - tunnel
