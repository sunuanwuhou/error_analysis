services:
  app:
    build:
      context: .
    container_name: xingce_v3_app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://xingce:xingce_password@postgres:5432/xingce}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M2.5}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080,http://127.0.0.1:8000,http://localhost:8000}
      XINGCE_RUNTIME_MODE: docker
      XINGCE_RUNTIME_LABEL: Docker / 127.0.0.1:8080
      OCR_BACKEND: ${OCR_BACKEND:-tesseract}
      OCR_TESSERACT_FALLBACK: ${OCR_TESSERACT_FALLBACK:-true}
      UMI_OCR_URL: ${UMI_OCR_URL:-http://umi-ocr:1224/api/ocr}
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./runtime:/app/runtime
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: xingce_v3_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xingce}
      POSTGRES_USER: ${POSTGRES_USER:-xingce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xingce_password}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  umi-ocr:
    image: xtulnx/ocr-umi:latest
    container_name: xingce_v3_umi_ocr
    environment:
      HEADLESS: "true"
      TZ: Asia/Shanghai
    ports:
      - "1224:1224"
    restart: unless-stopped
    profiles:
      - ocr-wechat

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: xingce_v3_tunnel
    depends_on:
      - app
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
      TZ: Asia/Shanghai
    volumes:
      - ./runtime:/runtime
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  postgres_data:
